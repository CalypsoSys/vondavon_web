<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The requested Vondavon Web page could not be found." />
    <title>Page Not Found | Vondavon Web</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="shell" id="content">
        <section class="hero not-found-hero">
            <div class="hero-copy">
                <p class="eyebrow">404</p>
                <h1>Page not found.</h1>
                <p class="hero-text">
                    The page you requested does not exist on this static deployment. Return to the domain portfolio to continue browsing.
                </p>
                <div class="hero-actions">
                    <a class="button button-primary" href="/">Return Home</a>
                </div>
            </div>
            <aside class="hero-panel" aria-label="Error summary">
                <p class="panel-label">Status</p>
                <dl class="metrics">
                    <div>
                        <dt>Code</dt>
                        <dd>404</dd>
                    </div>
                    <div>
                        <dt>Host</dt>
                        <dd>Cloudflare Pages-ready</dd>
                    </div>
                </dl>
            </aside>
        </section>
    </main>
</body>
</html>
